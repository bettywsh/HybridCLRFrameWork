syntax = "proto3";

package msg;
option go_package=".";

message Get0YuangouInfo{}

message Get0YuangouInfoRes{
    //当前0元购激活状态 没数据没有激活
    Player0YuangouInfo Info = 1;
}

//进行中的任务
message Player0YuangouInfo{
    //物品
    int32 GoodsId = 1;
    //购买时间
    int64 BuyTime = 2;
    //任务进度
    int64 TaskNumber = 3;
    //奖励进度 0-4 位与
    int32 RewardPro = 4;
}

message Complete0YuangouTaskReq{
    //任务标识
    int32 TaskIndex = 1;
}

message Complete0YuangouTaskRes{ 
    //结果 0成功 大于0失败 1.任务异常 2.没完成 3.已领取 4.其他错误
    int32 Result = 1;
}

//更新通知 
//主要用于倒计时结束通知 防止前后端时间不一致导致结束不一致问题
message Player0YuangouRefresh{
    //当前激活数据 没数据重置 有数据表示到期完成没领取
    Player0YuangouInfo Info = 1;
}